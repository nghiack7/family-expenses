<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Family Expenses</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --primary: #6366f1;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    .login-box h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.25rem; }
    .form-group input { width: 100%; padding: 0.625rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9375rem; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.625rem 1.25rem; border: none; border-radius: 8px; font-size: 0.9375rem; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #fff; font-size: 0.8125rem; padding: 0.5rem 1rem; width: auto; }
    .error { color: var(--danger); font-size: 0.8125rem; margin-top: 0.5rem; display: none; text-align: center; }

    /* Dashboard */
    .dashboard { display: none; max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .dash-header h1 { font-size: 1.25rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; }

    /* Chart */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .chart-card h3 { font-size: 0.9375rem; margin-bottom: 0.75rem; }
    .chart { display: flex; align-items: flex-end; gap: 2px; height: 120px; padding-top: 1.5rem; position: relative; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; position: relative; }
    .chart-bar { width: 100%; min-width: 4px; border-radius: 3px 3px 0 0; transition: height 0.3s; position: relative; }
    .chart-bar:hover { opacity: 0.8; }
    .chart-bar-wrap .chart-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.6875rem; white-space: nowrap; z-index: 10; margin-bottom: 4px; }
    .chart-bar-wrap:hover .chart-tooltip { display: block; }
    .chart-label { font-size: 0.5625rem; color: var(--muted); margin-top: 4px; writing-mode: vertical-lr; transform: rotate(180deg); max-height: 2.5rem; overflow: hidden; }
    .chart-zero { text-align: center; color: var(--muted); font-size: 0.8125rem; padding: 2rem; }

    /* Tables */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card h3 { font-size: 0.9375rem; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .loading { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="login-page">
    <div class="login-box">
      <h1>Admin Login</h1>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <div class="error" id="login-error"></div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>System Status</h1>
      <button class="btn-danger" id="logout-btn">Logout</button>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Users</div>
        <div class="stat-value" id="s-users">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Families</div>
        <div class="stat-value" id="s-families">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value" id="s-expenses">-</div>
      </div>
    </div>

    <div class="chart-card">
      <h3>New Users (last 30 days)</h3>
      <div id="chart-users" class="chart"></div>
    </div>

    <div class="chart-card">
      <h3>Expenses Created (last 30 days)</h3>
      <div id="chart-expenses" class="chart"></div>
    </div>

    <div class="card">
      <h3>Recent Users</h3>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Joined</th></tr></thead>
        <tbody id="t-users"><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Recent Families</h3>
      <table>
        <thead><tr><th>Name</th><th>Members</th><th>Created</th></tr></thead>
        <tbody id="t-families"><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);

    // Login
    $('#login-form').addEventListener('submit', async e => {
      e.preventDefault();
      $('#login-error').style.display = 'none';
      try {
        const res = await fetch('/api/admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: $('#username').value,
            password: $('#password').value,
          }),
        });
        if (!res.ok) {
          const d = await res.json();
          $('#login-error').textContent = d.error || 'Login failed';
          $('#login-error').style.display = 'block';
          return;
        }
        showDashboard();
      } catch {
        $('#login-error').textContent = 'Network error';
        $('#login-error').style.display = 'block';
      }
    });

    // Logout
    $('#logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin', { method: 'DELETE' });
      $('#dashboard').style.display = 'none';
      $('#login-page').style.display = 'flex';
    });

    async function showDashboard() {
      $('#login-page').style.display = 'none';
      $('#dashboard').style.display = 'block';
      await loadStats();
    }

    function renderChart(container, data, color) {
      if (!data.length) {
        container.innerHTML = '<div class="chart-zero">No data yet</div>';
        container.classList.remove('chart');
        return;
      }

      // Fill in missing dates in the 30-day range
      const filled = fillDates(data, 30);
      const max = Math.max(...filled.map(d => d.count), 1);

      container.innerHTML = filled.map(d => {
        const h = Math.max((d.count / max) * 100, d.count > 0 ? 4 : 1);
        const dateStr = new Date(d.date + 'T00:00:00').toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
        return `<div class="chart-bar-wrap">
          <div class="chart-tooltip">${dateStr}: ${d.count}</div>
          <div class="chart-bar" style="height:${h}%;background:${d.count > 0 ? color : 'var(--border)'}"></div>
        </div>`;
      }).join('');
    }

    function fillDates(data, days) {
      const map = {};
      data.forEach(d => { map[d.date] = d.count; });

      const result = [];
      const now = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const dt = new Date(now);
        dt.setDate(dt.getDate() - i);
        const key = dt.toISOString().slice(0, 10);
        result.push({ date: key, count: map[key] || 0 });
      }
      return result;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/admin');
        if (res.status === 401) {
          $('#dashboard').style.display = 'none';
          $('#login-page').style.display = 'flex';
          return;
        }
        const d = await res.json();

        $('#s-users').textContent = d.users.toLocaleString();
        $('#s-families').textContent = d.families.toLocaleString();
        $('#s-expenses').textContent = d.expenses.toLocaleString();

        // Charts
        renderChart($('#chart-users'), d.daily_users || [], 'var(--primary)');
        renderChart($('#chart-expenses'), d.daily_expenses || [], 'var(--success)');

        // Recent users table
        $('#t-users').innerHTML = d.recent_users.length
          ? d.recent_users.map(u => `<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>${fmtDate(u.created_at)}</td></tr>`).join('')
          : '<tr><td colspan="3" style="color:var(--muted)">No users yet</td></tr>';

        // Recent families table
        $('#t-families').innerHTML = d.recent_families.length
          ? d.recent_families.map(f => `<tr><td>${esc(f.name)}</td><td>${f.member_count}</td><td>${fmtDate(f.created_at)}</td></tr>`).join('')
          : '<tr><td colspan="3" style="color:var(--muted)">No families yet</td></tr>';

      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function fmtDate(s) {
      if (!s) return '-';
      const d = new Date(s + 'Z');
      return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    // Auto-check session on load
    (async () => {
      try {
        const res = await fetch('/api/admin');
        if (res.ok) showDashboard();
      } catch {}
    })();
  </script>
</body>
</html>
