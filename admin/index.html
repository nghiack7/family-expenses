<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Family Expenses</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #f1f5f9; --muted: #94a3b8; --primary: #6366f1;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    .login-box h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.25rem; }
    .form-group input { width: 100%; padding: 0.625rem 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9375rem; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.625rem 1.25rem; border: none; border-radius: 8px; font-size: 0.9375rem; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #fff; font-size: 0.8125rem; padding: 0.5rem 1rem; width: auto; }
    .error { color: var(--danger); font-size: 0.8125rem; margin-top: 0.5rem; display: none; text-align: center; }

    /* Dashboard */
    .dashboard { display: none; max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .dash-header h1 { font-size: 1.25rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; }
    .stat-sub { font-size: 0.8125rem; color: var(--muted); margin-top: 0.25rem; }

    /* DB meter */
    .db-meter { margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
    .db-meter h3 { font-size: 0.9375rem; margin-bottom: 0.75rem; }
    .meter-bar { height: 20px; background: var(--bg); border-radius: 10px; overflow: hidden; position: relative; }
    .meter-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
    .meter-fill.safe { background: var(--success); }
    .meter-fill.warn { background: var(--warning); }
    .meter-fill.danger { background: var(--danger); }
    .meter-info { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.8125rem; color: var(--muted); }

    .reg-status { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 999px; font-size: 0.8125rem; font-weight: 600; }
    .reg-open { background: rgba(34,197,94,0.15); color: var(--success); }
    .reg-closed { background: rgba(239,68,68,0.15); color: var(--danger); }

    /* Tables */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card h3 { font-size: 0.9375rem; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .loading { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="login-page">
    <div class="login-box">
      <h1>Admin Login</h1>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <div class="error" id="login-error"></div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>System Status</h1>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span class="reg-status" id="reg-status"></span>
        <button class="btn-danger" id="logout-btn">Logout</button>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Users</div>
        <div class="stat-value" id="s-users">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Families</div>
        <div class="stat-value" id="s-families">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value" id="s-expenses">-</div>
      </div>
    </div>

    <div class="db-meter">
      <h3>Database Usage (D1 — 5 GB limit)</h3>
      <div class="meter-bar"><div class="meter-fill" id="db-fill"></div></div>
      <div class="meter-info">
        <span id="db-used">-</span>
        <span id="db-remaining">-</span>
      </div>
    </div>

    <div class="card">
      <h3>Recent Users</h3>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Joined</th></tr></thead>
        <tbody id="t-users"><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Recent Families</h3>
      <table>
        <thead><tr><th>Name</th><th>Members</th><th>Created</th></tr></thead>
        <tbody id="t-families"><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);

    // Login
    $('#login-form').addEventListener('submit', async e => {
      e.preventDefault();
      $('#login-error').style.display = 'none';
      try {
        const res = await fetch('/api/admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: $('#username').value,
            password: $('#password').value,
          }),
        });
        if (!res.ok) {
          const d = await res.json();
          $('#login-error').textContent = d.error || 'Login failed';
          $('#login-error').style.display = 'block';
          return;
        }
        showDashboard();
      } catch {
        $('#login-error').textContent = 'Network error';
        $('#login-error').style.display = 'block';
      }
    });

    // Logout
    $('#logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin', { method: 'DELETE' });
      $('#dashboard').style.display = 'none';
      $('#login-page').style.display = 'flex';
    });

    async function showDashboard() {
      $('#login-page').style.display = 'none';
      $('#dashboard').style.display = 'block';
      await loadStats();
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/admin');
        if (res.status === 401) {
          $('#dashboard').style.display = 'none';
          $('#login-page').style.display = 'flex';
          return;
        }
        const d = await res.json();

        $('#s-users').textContent = d.users.toLocaleString();
        $('#s-families').textContent = d.families.toLocaleString();
        $('#s-expenses').textContent = d.expenses.toLocaleString();

        // DB meter
        const pct = Math.min(d.db.used_pct, 100);
        const fill = $('#db-fill');
        fill.style.width = Math.max(pct, 1) + '%';
        fill.className = 'meter-fill ' + (pct < 40 ? 'safe' : pct < 60 ? 'warn' : 'danger');
        $('#db-used').textContent = `Used: ${d.db.size_mb < 1 ? (d.db.size_mb * 1024).toFixed(0) + ' KB' : d.db.size_mb.toFixed(1) + ' MB'} (${pct.toFixed(2)}%)`;
        $('#db-remaining').textContent = `Remaining: ${d.db.remaining_mb.toFixed(0)} MB`;

        // Registration status
        const rs = $('#reg-status');
        if (d.registration_open) {
          rs.textContent = 'Registration Open';
          rs.className = 'reg-status reg-open';
        } else {
          rs.textContent = 'Waitlist Mode';
          rs.className = 'reg-status reg-closed';
        }

        // Recent users table
        $('#t-users').innerHTML = d.recent_users.length
          ? d.recent_users.map(u => `<tr><td>${esc(u.name)}</td><td>${esc(u.email)}</td><td>${fmtDate(u.created_at)}</td></tr>`).join('')
          : '<tr><td colspan="3" style="color:var(--muted)">No users yet</td></tr>';

        // Recent families table
        $('#t-families').innerHTML = d.recent_families.length
          ? d.recent_families.map(f => `<tr><td>${esc(f.name)}</td><td>${f.member_count}</td><td>${fmtDate(f.created_at)}</td></tr>`).join('')
          : '<tr><td colspan="3" style="color:var(--muted)">No families yet</td></tr>';

      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function fmtDate(s) {
      if (!s) return '-';
      const d = new Date(s + 'Z');
      return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    // Auto-check session on load
    (async () => {
      try {
        const res = await fetch('/api/admin');
        if (res.ok) showDashboard();
      } catch {}
    })();
  </script>
</body>
</html>
